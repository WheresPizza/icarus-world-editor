name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Download WebView2 Fixed Version Runtime (x64)
        shell: pwsh
        working-directory: src-tauri
        run: |
          # Resolve the latest published version from NuGet's flat-container index,
          # so we don't rot on a hardcoded pin that later gets unlisted.
          $ErrorActionPreference = "Stop"
          $index = Invoke-RestMethod -Uri "https://api.nuget.org/v3-flatcontainer/webview2.runtime.x64/index.json" -UseBasicParsing
          $version = $index.versions | Select-Object -Last 1
          if (-not $version) { throw "Could not resolve latest WebView2.Runtime.X64 version from NuGet index" }
          $url = "https://api.nuget.org/v3-flatcontainer/webview2.runtime.x64/$version/webview2.runtime.x64.$version.nupkg"
          Write-Host "Downloading WebView2 Fixed Runtime $version from $url"
          Invoke-WebRequest -Uri $url -OutFile wv2.nupkg -UseBasicParsing

          New-Item -ItemType Directory -Force -Path wv2-extracted | Out-Null
          Expand-Archive -Path wv2.nupkg -DestinationPath wv2-extracted -Force

          # Locate the folder that contains msedgewebview2.exe - this is the runtime root we need.
          $exe = Get-ChildItem -Path wv2-extracted -Recurse -Filter msedgewebview2.exe |
                 Select-Object -First 1
          if (-not $exe) { throw "msedgewebview2.exe not found in extracted package" }
          $runtimeRoot = $exe.Directory.FullName
          Write-Host "Runtime root detected: $runtimeRoot"

          New-Item -ItemType Directory -Force -Path webview2-runtime | Out-Null
          Copy-Item -Path (Join-Path $runtimeRoot '*') -Destination webview2-runtime -Recurse -Force

          Remove-Item -Recurse -Force wv2-extracted
          Remove-Item -Force wv2.nupkg

          # Sanity check
          if (-not (Test-Path webview2-runtime/msedgewebview2.exe)) {
            throw "webview2-runtime/msedgewebview2.exe missing after extraction"
          }
          Get-ChildItem webview2-runtime | Select-Object -First 5 Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ICARUS Prospect Editor ${{ github.ref_name }}"
          releaseBody: "Download the .exe installer below to install. WebView2 runtime and MSVC CRT are bundled — no additional downloads required at install time."
          releaseDraft: true
          prerelease: false
